name: Alerta no Telegram

on: [push]

jobs:
  telegram-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Notificação
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📂 **Atualização de Repositório**

            O push para o projeto de QA foi realizado com sucesso. 

            **Detalhes da Versão:**
            - **Repositório:** ${{ github.repository }}
            - **Resumo da alteração:** "${{ github.event.head_commit.message }}"
            - **Enviado por:** ${{ github.actor }}

            ---
            ✅ Etapa de CI/CD concluída. Seguimos com o cronograma!
